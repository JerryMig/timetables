<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>台鐵時刻查詢</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="search-panel" aria-labelledby="page-title">
        <div class="title-block">
          <p class="eyebrow">TRA Timetable</p>
          <h1 id="page-title">台鐵時刻查詢</h1>
        </div>

        <form id="search-form" class="search-form">
          <section class="route-view" aria-label="常用路線查詢">
            <div class="route-shortcuts" aria-label="常用路線">
              <span>常用路線</span>
              <div id="common-route-list" class="route-shortcut-list"></div>
              <button id="add-common-route" class="secondary-button add-route-button" type="button">新增常用路線</button>
            </div>
          </section>

          <div class="field-grid">
            <label class="field">
              <span>日期</span>
              <input id="travel-date" name="travelDate" type="date" required />
            </label>

            <label class="field">
              <span>出發時間</span>
              <input id="travel-time" name="travelTime" type="time" required />
            </label>
          </div>

          <datalist id="station-options"></datalist>

          <div class="actions">
            <button class="primary-button" type="submit">查詢班次</button>
            <p id="status-message" class="status-message" role="status"></p>
          </div>
        </form>
      </section>

      <section class="results-panel" aria-live="polite">
        <div class="results-header">
          <div>
            <p class="eyebrow">Results</p>
            <h2>查詢結果</h2>
          </div>
        </div>

        <div id="empty-state" class="empty-state">
          <h3>尚未查詢</h3>
          <p>選擇常用路線、日期與出發時間後送出，班次會依出發時間由早到晚排列。</p>
        </div>

        <div id="results-list" class="results-list"></div>
      </section>
    </main>

    <template id="trip-template">
      <article class="trip-card">
        <div class="trip-main">
          <div>
            <p class="train-type"></p>
            <h3 class="train-route"></h3>
          </div>
          <span class="train-no"></span>
        </div>
        <div class="time-row">
          <div>
            <span class="time-label">出發</span>
            <strong class="departure-time"></strong>
            <span class="departure-station"></span>
          </div>
          <div class="duration"></div>
          <div>
            <span class="time-label">抵達</span>
            <strong class="arrival-time"></strong>
            <span class="arrival-station"></span>
          </div>
        </div>
      </article>
    </template>

    <dialog id="common-route-dialog" class="route-dialog">
      <form class="route-dialog-form" method="dialog">
        <div class="dialog-header">
          <h2>新增常用路線</h2>
          <button id="cancel-common-route" class="icon-button" type="button" aria-label="關閉">×</button>
        </div>
        <label class="field">
          <span>起站</span>
          <input id="common-from-station" list="station-options" placeholder="例如：台北" autocomplete="off" />
        </label>
        <label class="field">
          <span>訖站</span>
          <input id="common-to-station" list="station-options" placeholder="例如：桃園" autocomplete="off" />
        </label>
        <div class="dialog-actions">
          <button id="save-common-route" class="primary-button" type="button">加入</button>
          <button class="secondary-button quiet-button" type="button" data-close-dialog>取消</button>
        </div>
      </form>
    </dialog>

    <script src="/app.js" type="module"></script>
  </body>
</html>
